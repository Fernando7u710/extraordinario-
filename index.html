<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mi primera Progressive Web App">
  <meta name="theme-color" content="#4a90e2">
  <title>Mi PWA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <header>
    <h1>Mi PWA</h1>
    <p>¡Hola! Esta es una Progressive Web App básica.</p>
  </header>

  <main>
    <section class="features">
      <h2>Características</h2>
      <ul>
        <li>✅ Instalable en dispositivo</li>
        <li>✅ Funciona sin conexión</li>
        <li>✅ Carga rápida</li>
      </ul>
    </section>

    <section class="status">
      <h2>Estado de Instalación</h2>
      <p id="install-status">Detectando soporte...</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
